# fly.toml app configuration file generated for mermaid-server on 2026-05-19T10:42:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mermaid-server'
primary_region = 'yyz'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
